# ── Prefix ─────────────────────────────────────────────
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# ── Base settings ──────────────────────────────────────
set -g mouse on
set-option -g allow-rename off
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g focus-events on
set -g renumber-windows on
set -g repeat-time 0
setw -g aggressive-resize on

# ── Splits ─────────────────────────────────────────────
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (Alt + arrow / hjkl) ──────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane movement (Alt + Shift + hjkl) ─────────────────
bind -n M-H swap-pane -s '{left-of}'
bind -n M-J swap-pane -s '{down-of}'
bind -n M-K swap-pane -s '{up-of}'
bind -n M-L swap-pane -s '{right-of}'

# ── Pane: cycle, swap, kill ────────────────────────────
bind -n M-o select-pane -t :.+1
bind -n M-O swap-pane -D
bind -n M-w if-shell '[ "$(tmux display -p "#{window_panes}")" -gt 1 ]' 'kill-pane' 'kill-pane'

# ── Smart split (Alt + n) ──────────────────────────────
bind -n M-n run-shell 'w=$(tmux display -p "#{pane_width}"); h=$(tmux display -p "#{pane_height}"); if [ $(( w * 6 )) -gt $(( h * 10 )) ]; then tmux split-pane -h -c "#{pane_current_path}"; else tmux split-pane -v -c "#{pane_current_path}"; fi'

# ── Workspace switch (Alt + 1-9) ──────────────────────
bind -n M-1 run-shell 'if [ "$(tmux display -p "#I")" != "1" ]; then tmux select-window -t :1 || tmux new-window -t :1; else tmux last-window; fi'
bind -n M-2 run-shell 'if [ "$(tmux display -p "#I")" != "2" ]; then tmux select-window -t :2 || tmux new-window -t :2; else tmux last-window; fi'
bind -n M-3 run-shell 'if [ "$(tmux display -p "#I")" != "3" ]; then tmux select-window -t :3 || tmux new-window -t :3; else tmux last-window; fi'
bind -n M-4 run-shell 'if [ "$(tmux display -p "#I")" != "4" ]; then tmux select-window -t :4 || tmux new-window -t :4; else tmux last-window; fi'
bind -n M-5 run-shell 'if [ "$(tmux display -p "#I")" != "5" ]; then tmux select-window -t :5 || tmux new-window -t :5; else tmux last-window; fi'
bind -n M-6 run-shell 'if [ "$(tmux display -p "#I")" != "6" ]; then tmux select-window -t :6 || tmux new-window -t :6; else tmux last-window; fi'
bind -n M-7 run-shell 'if [ "$(tmux display -p "#I")" != "7" ]; then tmux select-window -t :7 || tmux new-window -t :7; else tmux last-window; fi'
bind -n M-8 run-shell 'if [ "$(tmux display -p "#I")" != "8" ]; then tmux select-window -t :8 || tmux new-window -t :8; else tmux last-window; fi'
bind -n M-9 run-shell 'if [ "$(tmux display -p "#I")" != "9" ]; then tmux select-window -t :9 || tmux new-window -t :9; else tmux last-window; fi'

# Workspace 10
bind -n M-0 run-shell 'if [ "$(tmux display -p "#I")" != "10" ]; then tmux select-window -t :10 || tmux new-window -t :10; else tmux last-window; fi'

# ── Move pane to workspace (Alt + Shift + 1-9) ────────
bind -n M-! if-shell "tmux join-pane -t :1" '' "new-window -dt :1; join-pane -t :1; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-@ if-shell "tmux join-pane -t :2" '' "new-window -dt :2; join-pane -t :2; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-# if-shell "tmux join-pane -t :3" '' "new-window -dt :3; join-pane -t :3; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-$ if-shell "tmux join-pane -t :4" '' "new-window -dt :4; join-pane -t :4; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-% if-shell "tmux join-pane -t :5" '' "new-window -dt :5; join-pane -t :5; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-^ if-shell "tmux join-pane -t :6" '' "new-window -dt :6; join-pane -t :6; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-& if-shell "tmux join-pane -t :7" '' "new-window -dt :7; join-pane -t :7; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-* if-shell "tmux join-pane -t :8" '' "new-window -dt :8; join-pane -t :8; select-pane -t top-left; kill-pane" \; select-layout -E
bind -n M-( if-shell "tmux join-pane -t :9" '' "new-window -dt :9; join-pane -t :9; select-pane -t top-left; kill-pane" \; select-layout -E

# Move pane to workspace 10
bind -n M-) if-shell "tmux join-pane -t :10" '' "new-window -dt :10; join-pane -t :10; select-pane -t top-left; kill-pane" \; select-layout -E

# ── Layouts (Alt + mnemonic) ───────────────────────────
bind -n M-s select-layout main-horizontal \; select-layout -E
bind -n M-S select-layout even-vertical   \; select-layout -E
bind -n M-v select-layout main-vertical   \; select-layout -E
bind -n M-V select-layout even-horizontal \; select-layout -E
bind -n M-t select-layout tiled           \; select-layout -E
bind -n M-z resize-pane -Z
bind -n M-r select-layout -E

# ── Window management ──────────────────────────────────
bind -n M-Enter command-prompt -p 'Rename window:' 'rename-window "%%"'
bind -n M-E confirm-before -p "Detach from #H:#S? (y/n)" detach-client

# ── Misc hooks ─────────────────────────────────────────
set-hook -g window-linked "select-layout tiled; select-layout -E"

# ── Visual: pane dimming ───────────────────────────────
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'
set-hook -g pane-focus-out 'select-pane -P "fg=colour8,bg=colour235"'
set-hook -g pane-focus-in  'select-pane -P "fg=default,bg=default"'
run-shell -b 'tmux list-panes -a -F "#{session_name}:#{window_index}.#{pane_index} #{pane_active}" | awk "\$2==0 {print \$1}" | xargs -r -I{} tmux select-pane -t {} -P "fg=colour8,bg=colour235"'

# ── Visual: pane borders ───────────────────────────────
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# ── Visual: status bar ─────────────────────────────────
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=yellow'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# ── Visual: messages ───────────────────────────────────
set -g message-style 'fg=yellow bg=red bold'
